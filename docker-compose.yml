services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-changeme_replace_in_production}
      PORT: 3001
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3001}:3001"
    extra_hosts:
      - "host-gateway:host-gateway"
    cap_add:
      - NET_RAW  # Required for ICMP ping
